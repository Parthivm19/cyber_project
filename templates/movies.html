{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2>Movies</h2>
    <form method="GET" action="{{ url_for('movies.list_movies') }}" style="display: flex; gap: 10px;">
        <input type="text" name="q" placeholder="Search movies..." value="{{ search|e }}" style="margin:0; width:200px;">
        <button type="submit" class="btn">Search</button>
    </form>
</div>

<div class="grid-container">
    {% for movie in movies %}
    <div class="card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
        {% if movie.image_url %}
        <div style="height: 350px; overflow: hidden; position: relative;">
            <img src="{{ movie.image_url }}" alt="{{ movie.title }} poster" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            <div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, var(--card-bg), transparent); height: 100px;"></div>
        </div>
        {% endif %}
        <div style="padding: 25px; flex-grow: 1; display: flex; flex-direction: column;">
            <h3 style="color: #f8fafc; font-size: 1.3em; margin-bottom: 5px; margin-top: 0;">{{ movie.title }} <span style="font-size: 0.8em; color: #94a3b8; font-weight: normal;">({{ movie.year }})</span></h3>
            <p style="color: #a78bfa; font-weight: 500; margin-top: 0; margin-bottom: 15px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px;">{{ movie.genre }}</p>
            <p style="color: #cbd5e1; line-height: 1.6; flex-grow: 1; font-size: 0.95em;">{{ movie.description }}</p>
            <div style="margin-top: 20px;">
                <a href="{{ url_for('bookings.book_movie', movie_id=movie.id) }}" class="btn" style="width: 100%;">Book Tickets</a>
            </div>
        </div>
    </div>
    {% else %}
    <p style="text-align: center; color: #94a3b8; padding: 40px; background: rgba(30, 41, 59, 0.4); border-radius: 12px; grid-column: 1 / -1;">No movies found matching your search.</p>
    {% endfor %}
</div>
{% endblock %}
