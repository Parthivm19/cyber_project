{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2>Movies</h2>
    <form method="GET" action="{{ url_for('movies.list_movies') }}" style="display: flex; gap: 10px;">
        <input type="text" name="q" placeholder="Search movies..." value="{{ search|e }}" style="margin:0; width:200px;">
        <button type="submit" class="btn">Search</button>
    </form>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
    {% for movie in movies %}
    <div class="card">
        <h3>{{ movie.title }} ({{ movie.year }})</h3>
        <p style="color: #bbb;"><strong>Genre:</strong> {{ movie.genre }}</p>
        <p>{{ movie.description }}</p>
        <div style="margin-top: 15px;">
            <a href="{{ url_for('bookings.book_movie', movie_id=movie.id) }}" class="btn">Book Tickets</a>
        </div>
    </div>
    {% else %}
    <p>No movies found matching your search.</p>
    {% endfor %}
</div>
{% endblock %}
