{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <h2>🤖 AI Movie Assistant</h2>
    <p>Tell me what kind of movie you're in the mood for, and I'll suggest something from our collection!</p>
    
    <div id="chat-window" style="background-color: #121212; height: 300px; overflow-y: scroll; padding: 15px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #444;">
        <div style="color: #bb86fc; margin-bottom: 10px;"><strong>AI:</strong> Hello! What type of movie would you like to watch today?</div>
    </div>
    
    <div style="display: flex; gap: 10px;">
        <!-- Security: We use JS to send the request, so we grab the CSRF token from a meta tag if we had one, 
             or we can just use WTForms, but since this is a simple demo, we pass it via headers. -->
        <input type="hidden" id="csrf_token" value="{{ csrf_token() }}">
        <input type="text" id="user-message" placeholder="e.g., I want an action movie from the 2000s..." style="flex-grow: 1; margin: 0;">
        <button id="send-btn" class="btn">Ask</button>
    </div>
</div>

<script>
    document.getElementById('send-btn').addEventListener('click', async () => {
        const input = document.getElementById('user-message');
        const message = input.value.trim();
        if (!message) return;
        
        const chatWindow = document.getElementById('chat-window');
        chatWindow.innerHTML += `<div style="color: #f5f5f5; margin-bottom: 10px; text-align: right;"><strong>You:</strong> ${message}</div>`;
        input.value = '';
        
        const csrfToken = document.getElementById('csrf_token').value;
        
        chatWindow.innerHTML += `<div id="loading" style="color: #888; margin-bottom: 10px;"><strong>AI:</strong> Thinking...</div>`;
        chatWindow.scrollTop = chatWindow.scrollHeight;
        
        try {
            const response = await fetch('{{ url_for("movies.chatbot") }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ message: message })
            });
            
            const data = await response.json();
            document.getElementById('loading').remove();
            
            // Security: In a real app we might use DOMPurify if rendering markdown, 
            // but textContent prevents XSS when setting text directly.
            const msgDiv = document.createElement('div');
            msgDiv.style.color = '#bb86fc';
            msgDiv.style.marginBottom = '10px';
            msgDiv.innerHTML = `<strong>AI:</strong> ${data.response.replace(/\n/g, '<br>')}`; 
            chatWindow.appendChild(msgDiv);
        } catch (e) {
            document.getElementById('loading').remove();
            chatWindow.innerHTML += `<div style="color: red; margin-bottom: 10px;"><strong>Error:</strong> Failed to connect to AI.</div>`;
        }
        
        chatWindow.scrollTop = chatWindow.scrollHeight;
    });
</script>
{% endblock %}
